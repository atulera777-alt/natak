          <h2>a. Use the scope resolution operator to declare variables at different scope levels. Display and compare the values of variables with different scopes.</h2>
<textarea id="code1" rows="10" cols="80">
#include <iostream.h>
#include <conio.h>

// Global variable
int x = 10;

class Demo
{
public:
    // Class variable
    int x;

    void show()
    {
        // Local variable
        int x = 30;

        cout << "Local variable x = " << x << endl;
        cout << "Class variable x = " << this->x << endl;
        cout << "Global variable x = " << ::x << endl;
    }
};

void main()
{
    clrscr();

    Demo obj;
    obj.x = 20;   // Assign value to class variable

    obj.show();

    getch();
}
</textarea>
<button onclick="copyCode('code1', this)">Copy</button>

<br><br>
      
<script>
function copyCode(id, btn) {
  let text = document.getElementById(id).value;

  navigator.clipboard.writeText(text);

  btn.innerText = "✅ Copied!";
  
  setTimeout(() => {
    btn.innerText = "📋 Copy";
  }, 2000);
}
</script>
