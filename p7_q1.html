<body>
    <h2>Exception Handling:</h2>

    <div class="container">
          <h2>Demonstrate predefined exceptions (e.g., ZERO_DIVIDE, NO_DATA_FOUND)</h2>
<textarea id="code1" rows="10" cols="80">
1)Demonstration of ZERO_DIVIDE
DECLARE
    num1 NUMBER := 10;
    num2 NUMBER := 0;
    result NUMBER;
BEGIN
    result := num1 / num2;  -- This will raise ZERO_DIVIDE
    DBMS_OUTPUT.PUT_LINE('Result: ' || result);

EXCEPTION
    WHEN ZERO_DIVIDE THEN
        DBMS_OUTPUT.PUT_LINE('Error: Cannot divide by zero.');
END;
/
</textarea>
<button onclick="copyCode('code1', this)">Copy</button>

<br><br>
<h2>2)Demonstration of NO_DATA_FOUND</h2>
<textarea id="code2"rows="10" cols="80">CREATE TABLE employees (
    employee_id NUMBER PRIMARY KEY,
    first_name  VARCHAR2(50)
);
INSERT INTO employees VALUES (1, 'John');
COMMIT;
DECLARE
    emp_name VARCHAR2(50);
BEGIN
    SELECT first_name
    INTO emp_name
    FROM employees
    WHERE employee_id = 99999;  -- Assuming this ID does not exist

    DBMS_OUTPUT.PUT_LINE('Employee Name: ' || emp_name);

EXCEPTION
    WHEN NO_DATA_FOUND THEN
        DBMS_OUTPUT.PUT_LINE('Error: No employee found with given ID.');
END;
/</textarea>
<button onclick="copyCode('code2', this)">Copy</button>

<script>
function copyCode(id, btn) {
  let text = document.getElementById(id).value;

  navigator.clipboard.writeText(text);

  btn.innerText = "✅ Copied!";
  
  setTimeout(() => {
    btn.innerText = "📋 Copy";
  }, 2000);
}
</script>
